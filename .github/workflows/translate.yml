name: Auto Translate Docs

on:
  push:
    branches:
      - main
    paths:
      - 'docs/*.md'

jobs:
  translate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Translation Library
        run: pip install deep-translator

      - name: Run Translation Script
        run: |
          python - <<'EOF'
          import os
          import glob
          import time
          import re
          from deep_translator import GoogleTranslator

          # Spanish, French, and Greek
          languages = {
              'es': 'es',
              'fr': 'fr',
              'el': 'el',
              'zh': 'zh-CN'
          }

          # Find all English markdown files directly in the docs/ folder
          md_files = [f for f in glob.glob('docs/*.md') if os.path.isfile(f)]

          for folder_name, api_code in languages.items():
              target_dir = os.path.join('docs', folder_name)
              os.makedirs(target_dir, exist_ok=True)
              
              translator = GoogleTranslator(source='en', target=api_code)
              
              for file_path in md_files:
                  filename = os.path.basename(file_path)
                  output_path = os.path.join(target_dir, filename)
                  
                  print(f"Translating {filename} to {api_code}...")
                  
                  with open(file_path, 'r', encoding='utf-8') as f:
                      content = f.read()
                  
                  # 1. Safely split the document by Markdown code blocks first
                  parts = re.split(r'(```[\s\S]*?```)', content)
                  translated_parts = []
                  
                  for part in parts:
                      # 2. If it is a code block, DO NOT translate it. Keep it exactly the same.
                      if part.startswith('```'):
                          translated_parts.append(part)
                      else:
                          # 3. If it is regular text, split into paragraphs and translate
                          paragraphs = part.split('\n\n')
                          trans_paras = []
                          
                          for para in paragraphs:
                              if para.strip():
                                  try:
                                      translated_text = translator.translate(para)
                                      trans_paras.append(translated_text if translated_text is not None else para)
                                      time.sleep(0.5)
                                  except Exception as e:
                                      print(f"Skipped a paragraph due to error: {e}")
                                      trans_paras.append(para)
                                      time.sleep(1)
                              else:
                                  trans_paras.append('')
                                  
                          translated_parts.append('\n\n'.join(trans_paras))
                          
                  # 4. Glue the untouched code and translated text back together
                  translated_content = "".join(translated_parts)
                  
                  with open(output_path, 'w', encoding='utf-8') as f:
                      f.write(translated_content)
          EOF

      - name: Commit and Push Translations
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/
          git commit -m "docs: native auto-updated translations [skip ci]" || exit 0
          git push
