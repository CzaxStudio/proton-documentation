name: Auto Translate Docs

on:
  push:
    branches:
      - main
    paths:
      - 'docs/*.md'

jobs:
  translate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Translation Library
        run: pip install deep-translator

      - name: Run Translation Script
        run: |
          python - <<'EOF'
          import os
          import glob
          import time
          from deep_translator import GoogleTranslator

          # French, Spanish, and Chinese
          languages = {
              'es': 'spanish',
              'fr': 'french',
              'zh': 'chinese (simplified)'
          }

          # Find all English markdown files directly in the docs/ folder
          md_files = [f for f in glob.glob('docs/*.md') if os.path.isfile(f)]

          for lang_code, lang_name in languages.items():
              target_dir = os.path.join('docs', lang_code)
              os.makedirs(target_dir, exist_ok=True)
              
              translator = GoogleTranslator(source='en', target=lang_code)
              
              for file_path in md_files:
                  filename = os.path.basename(file_path)
                  output_path = os.path.join(target_dir, filename)
                  
                  print(f"Translating {filename} to {lang_name}...")
                  
                  with open(file_path, 'r', encoding='utf-8') as f:
                      content = f.read()
                  
                  # Split text into paragraphs
                  paragraphs = content.split('\n\n')
                  translated_paragraphs = []
                  
                  for para in paragraphs:
                      if para.strip():
                          try:
                              # Skip code blocks
                              if para.strip().startswith('```') or para.strip().startswith('import '):
                                  translated_paragraphs.append(para)
                              else:
                                  translated_text = translator.translate(para)
                                  translated_paragraphs.append(translated_text if translated_text is not None else para)
                                  
                                  # SAFETY PAUSE: Wait half a second to prevent Google from blocking us
                                  time.sleep(0.5)
                          except Exception as e:
                              print(f"Skipped a paragraph due to error: {e}")
                              translated_paragraphs.append(para)
                              time.sleep(1) # Wait a little longer if we hit an error
                      else:
                          translated_paragraphs.append('')
                          
                  translated_content = '\n\n'.join(translated_paragraphs)
                  
                  with open(output_path, 'w', encoding='utf-8') as f:
                      f.write(translated_content)
          EOF

      - name: Commit and Push Translations
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/
          git commit -m "docs: native auto-updated translations [skip ci]" || exit 0
          git push
