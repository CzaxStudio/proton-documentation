name: Auto Translate Docs

on:
  push:
    branches:
      - main
    paths:
      - 'docs/*.md'

jobs:
  translate:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Explicitly grants write permissions to the action
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Auto Translate Markdown
        uses: lnkhed/markdown-translate-action@v1
        with:
          target_languages: es,fr,de,ja,zh
          source_dir: docs
          output_dir: docs
          # This action defaults to a free fallback provider if no key is specified

      - name: Commit and Push Translations
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/
          git commit -m "docs: auto-updated language translations [skip ci]" || exit 0
          git push
